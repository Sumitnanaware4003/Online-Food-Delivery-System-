<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Successful</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f7f7f7;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .success-box {
        background: white;
        padding: 40px;
        border-radius: 10px;
        text-align: center;
        width: 400px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .success-box i {
        font-size: 70px;
        color: #28a745;
        margin-bottom: 20px;
    }

    .success-box h2 {
        margin-bottom: 10px;
    }

    .success-box p {
        color: #555;
        margin-bottom: 25px;
    }

    .success-box a {
        display: inline-block;
        background: #ff624d;
        color: white;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 5px;
        margin: 5px;
    }

    .success-box a:hover {
        opacity: 0.9;
    }
</style>
</head>

<body>

<div class="success-box">
    <i class="fas fa-check-circle"></i>
    <h2>Order Placed Successfully!</h2>
    <p>Your delicious food is being prepared 🍔🍕</p>

    <a href="orders.html">View Orders</a>
    <a href="index.html">Continue Shopping</a>
</div>

</body>
</html>
